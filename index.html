<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Support — Geoffrey Gil</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:#F4F6F9;min-height:100vh}
.wrap{max-width:480px;margin:0 auto}
.hdr{background:#1A1A2E;color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.hdr h1{font-size:15px;font-weight:700;flex:1}
.hdr-sub{font-size:10px;opacity:.6;display:block;margin-top:1px}
.adm-btn{font-size:11px;font-weight:700;padding:4px 10px;border-radius:10px;border:none;cursor:pointer;white-space:nowrap}
.search-bar{padding:10px 14px;background:#fff;border-bottom:1px solid #E0E4E8;position:sticky;top:53px;z-index:99}
.search-bar input{width:100%;padding:9px 12px;border:1.5px solid #E0E4E8;border-radius:20px;font-size:14px;outline:none;font-family:inherit}
.search-bar input:focus{border-color:#1A1A2E}
.pad{padding:12px}
.tabs{display:flex;gap:5px;overflow-x:auto;padding-bottom:4px;margin-bottom:10px}
.tab{padding:6px 11px;border:none;border-radius:14px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}

/* LISTE DES TICKETS */
.ticket{background:#fff;border-radius:12px;margin-bottom:8px;box-shadow:0 1px 6px rgba(0,0,0,.06);border-left:4px solid;cursor:pointer;overflow:hidden;transition:box-shadow .15s}
.ticket:hover{box-shadow:0 2px 12px rgba(0,0,0,.1)}
.ticket-head{padding:12px 14px}
.ticket-title{font-size:14px;font-weight:700;color:#1A1A2E;margin-bottom:5px}
.ticket-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px}
.ticket-preview{font-size:11px;color:#7F8C8D;margin-top:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.msg-count{font-size:10px;color:#B0B8C1;margin-left:auto}
.new-badge{background:#E94560;color:#fff;font-size:10px;font-weight:800;padding:2px 6px;border-radius:8px}

/* VUE TICKET */
.ticket-view{background:#F4F6F9;min-height:100vh}
.ticket-info{background:#fff;padding:14px;margin-bottom:8px;border-left:4px solid}
.ticket-info h2{font-size:15px;font-weight:800;color:#1A1A2E;margin-bottom:6px}
.ticket-info p{font-size:13px;color:#7F8C8D}
.messages-list{padding:0 12px 80px}
.msg{margin-bottom:10px;display:flex;flex-direction:column}
.msg.axel{align-items:flex-end}
.msg.client{align-items:flex-start}
.msg-bubble{max-width:80%;padding:10px 13px;border-radius:14px;font-size:13px;line-height:1.5}
.msg.client .msg-bubble{background:#fff;border-radius:4px 14px 14px 14px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.msg.axel .msg-bubble{background:#1A1A2E;color:#fff;border-radius:14px 4px 14px 14px}
.msg-img{max-width:100%;border-radius:10px;margin-top:6px;cursor:pointer}
.msg-meta{font-size:10px;color:#B0B8C1;margin-top:3px;padding:0 4px}
.msg-input-wrap{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid #E0E4E8;padding:10px 12px;display:flex;gap:8px;align-items:flex-end;z-index:50}
.msg-input{flex:1;padding:9px 12px;border:1.5px solid #E0E4E8;border-radius:20px;font-size:14px;outline:none;resize:none;font-family:inherit;max-height:100px;overflow-y:auto}
.msg-input:focus{border-color:#1A1A2E}
.send-btn{width:38px;height:38px;border-radius:50%;background:#1A1A2E;color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px}
.attach-btn{width:38px;height:38px;border-radius:50%;background:#F4F6F9;color:#7F8C8D;border:1.5px solid #E0E4E8;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;position:relative}
.attach-btn input{position:absolute;inset:0;opacity:0;cursor:pointer}
.status-bar{display:flex;gap:6px;padding:8px 12px;background:#fff;border-bottom:1px solid #F0F0F0;overflow-x:auto}
.s-btn{padding:5px 10px;border-radius:12px;border:none;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap}

/* MODAL ajout */
.ovl{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end}
.sheet{background:#fff;border-radius:20px 20px 0 0;padding:22px;width:100%;max-height:90vh;overflow-y:auto}
.sheet h2{font-size:17px;font-weight:800;margin-bottom:14px}
.fg{margin-bottom:11px}
.fg label{display:block;font-size:11px;font-weight:700;color:#7F8C8D;text-transform:uppercase;margin-bottom:4px}
.fg input,.fg textarea{width:100%;padding:10px 12px;border:1.5px solid #E0E4E8;border-radius:8px;font-size:14px;font-family:inherit;outline:none}
.fg input:focus,.fg textarea:focus{border-color:#1A1A2E}
.fg textarea{resize:none}
.cats{display:flex;gap:6px;flex-wrap:wrap}
.cat{padding:5px 11px;border:2px solid;border-radius:12px;font-size:12px;font-weight:700;cursor:pointer}
.btn-s{width:100%;padding:12px;background:#1A1A2E;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px}
.btn-s:disabled{opacity:.4}
.fab{position:fixed;bottom:22px;right:22px;width:52px;height:52px;border-radius:50%;background:#E94560;color:#fff;font-size:24px;border:none;cursor:pointer;box-shadow:0 4px 14px rgba(233,69,96,.4);display:flex;align-items:center;justify-content:center;z-index:50}
.empty{text-align:center;padding:40px 20px;color:#B0B8C1}
.spin{text-align:center;padding:40px;color:#7F8C8D;font-size:13px}
.highlight{background:#FFF3CD}
</style>
</head>
<body>
<div id="root"></div>
<script>
const SUPABASE_URL = 'https://esyclfumvpmqgvsrduph.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVzeWNsZnVtdnBtcWd2c3JkdXBoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzMzUyNTgsImV4cCI6MjA5ODkxMTI1OH0.vWHNrZGK3KyimAEyzjhom1b8n4Rciq2op35gbfyaSLY';
const CLIENT_NOM = 'Geoffrey Gil Chocolaterie';
const ADMIN_PIN  = '2813';

const CATS  = [{id:'bug',l:'🐛 Bug',c:'#E94560',b:'#FFF0F0'},{id:'idee',l:'💡 Idée',c:'#F39C12',b:'#FFF8F0'},{id:'amelio',l:'🔧 Amélioration',c:'#3498DB',b:'#EBF5FB'}];
const STATS = [{id:'recu',l:'📥 Reçu',c:'#7F8C8D',b:'#F4F6F9'},{id:'info',l:'❓ Info requise',c:'#F39C12',b:'#FFF8F0'},{id:'cours',l:'⚙️ En cours',c:'#3498DB',b:'#EBF5FB'},{id:'verif',l:'🔍 À vérifier',c:'#8E44AD',b:'#F5EEF8'},{id:'done',l:'✅ Terminé',c:'#27AE60',b:'#F0FFF4'}];

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let tickets=[], openTicket=null, messages=[], isAdmin=false, pinVal='', filtreCat='all', filtreStatut='all', recherche='', selectedCat='bug', currentUser='', showArchived=false;

// ── Rendu racine ────────────────────────────────────────────────────────────
function render() { document.getElementById('root').innerHTML = openTicket ? renderTicketView() : renderList(); bindEvents(); }

function getCat(id){return CATS.find(c=>c.id===id)||CATS[0];}
function getStat(id){return STATS.find(s=>s.id===id)||STATS[0];}
function esc(s){return String(s).replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function timeAgo(d){const s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return 'à l\'instant';if(s<3600)return Math.floor(s/60)+'min';if(s<86400)return Math.floor(s/3600)+'h';return new Date(d).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'});}

// ── LISTE DES TICKETS ────────────────────────────────────────────────────────
function renderList(){
  const q=recherche.trim().toLowerCase();
  // Filtre actifs vs archivés
  const base=tickets.filter(t=>showArchived ? t.archived : !t.archived);
  let filtered=base.filter(t=>(filtreCat==='all'||t.categorie===filtreCat)&&(filtreStatut==='all'||t.statut===filtreStatut));
  if(q) filtered=filtered.filter(t=>t.titre.toLowerCase().includes(q)||t.description?.toLowerCase().includes(q)||(t._lastMsg||'').toLowerCase().includes(q));

  const catBtns=[{id:'all',l:'Tous',n:base.length},...CATS.map(c=>({id:c.id,l:c.l,n:base.filter(t=>t.categorie===c.id).length}))];
  const statBtns=[{id:'all',l:'Tous statuts',n:base.length},...STATS.map(s=>({id:s.id,l:s.l.split(' ')[0]+' '+s.l.split(' ').slice(1).join(' '),n:base.filter(t=>t.statut===s.id).length}))];
  const nbArchived=tickets.filter(t=>t.archived).length;
  
  return `
  <div class="wrap">
    <div class="hdr">
      <div style="flex:1">
        <div style="font-size:15px;font-weight:700">${CLIENT_NOM}</div>
        <div style="font-size:10px;opacity:.6;margin-top:1px">${tickets.length} ticket${tickets.length>1?'s':''} · Support & Retours</div>
      </div>
      <button class="adm-btn" id="adminBtn" style="background:${isAdmin?'#27AE60':'rgba(255,255,255,.15)'};color:#fff">${isAdmin?'Mode Axel ✓':'Admin'}</button>
    </div>
    <div class="search-bar">
      <input id="searchInp" placeholder="🔍 Rechercher un ticket, un message..." value="${esc(recherche)}" oninput="recherche=this.value;render()">
    </div>
    <div class="pad">
      <div class="tabs">${catBtns.map(b=>`<button class="tab" style="background:${filtreCat===b.id?'#1A1A2E':'#E0E4E8'};color:${filtreCat===b.id?'#fff':'#2C3E50'}" onclick="filtreCat='${b.id}';render()">${b.l} (${b.n})</button>`).join('')}</div>
      <div class="tabs">${statBtns.map(b=>`<button class="tab" style="background:${filtreStatut===b.id?(getStat(b.id)||{c:'#1A1A2E'}).c:'#E0E4E8'};color:${filtreStatut===b.id?'#fff':'#2C3E50'}" onclick="filtreStatut='${b.id}';render()">${b.l} (${b.n})</button>`).join('')}</div>
      <!-- Bouton archives -->
      <div style="margin-bottom:10px">
        <button onclick="showArchived=!showArchived;render()" style="background:${showArchived?'#7F8C8D':'#F4F6F9'};color:${showArchived?'#fff':'#7F8C8D'};border:1.5px solid #E0E4E8;border-radius:10px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;width:100%;text-align:left">
          📦 ${showArchived?'← Retour aux tickets actifs':'Archives ('+nbArchived+' ticket'+(nbArchived>1?'s':'')+')'}
        </button>
      </div>
      ${filtered.length===0?`<div class="empty"><div style="font-size:40px;margin-bottom:8px">${showArchived?'📦':'🎉'}</div><p>${showArchived?'Aucune archive':'Aucun ticket'}</p></div>`:filtered.map(t=>{
        const cat=getCat(t.categorie),stat=getStat(t.statut);
        const lastMsg=t._lastMsg?`<div class="ticket-preview">${esc(t._lastMsg)}</div>`:'';
        const msgCnt=t._msgCount>0?`<span class="msg-count">💬 ${t._msgCount}</span>`:'';
        const newBadge=t.statut==='info'&&!isAdmin?`<span class="new-badge">Réponse requise</span>`:'';
        return `<div class="ticket" style="border-left-color:${cat.c}" onclick="openTicketFn('${t.id}')">
          <div class="ticket-head">
            <div class="ticket-title">${esc(t.titre)}</div>
            <div class="ticket-meta">
              <span class="badge" style="background:${cat.b};color:${cat.c}">${cat.l}</span>
              <span class="badge" style="background:${stat.b};color:${stat.c}">${stat.l}</span>
              ${newBadge}
              ${msgCnt}
              <span style="font-size:10px;color:#B0B8C1;margin-left:auto">${timeAgo(t.created_at)} · ${esc(t.auteur)}</span>
            </div>
            ${lastMsg}
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>
  <button class="fab" id="fabBtn">+</button>
  ${renderPinSheet()}
  ${renderAddSheet()}`;
}

// ── VUE TICKET (conversation) ────────────────────────────────────────────────
function renderTicketView(){
  const t=openTicket;
  const cat=getCat(t.categorie),stat=getStat(t.statut);
  const msgs=messages.map(m=>{
    const isAxel=m.auteur==='Axel'||m.auteur.includes('Axel');
    const side=isAxel?'axel':'client';
    const img=m.type==='image'&&m.url?`<img class="msg-img" src="${m.url}" alt="capture" loading="lazy" onclick="window.open('${m.url}','_blank')">` :'';
    return `<div class="msg ${side}">
      <div class="msg-bubble">${esc(m.contenu)}${img}</div>
      <div class="msg-meta">${esc(m.auteur)} · ${timeAgo(m.created_at)}</div>
    </div>`;
  }).join('');
  const archiveBtn=isAdmin&&t.statut==='done'&&!t.archived?`<button onclick="archiveTicket('${t.id}')" style="margin-left:auto;background:#F4F6F9;color:#7F8C8D;border:none;padding:5px 12px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0">📦 Archiver</button>`:'';
  const unarchiveBtn=isAdmin&&t.archived?`<button onclick="unarchiveTicket('${t.id}')" style="margin-left:auto;background:#EBF5FB;color:#3498DB;border:none;padding:5px 12px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0">↩ Désarchiver</button>`:'';
  const archivedBanner=t.archived?`<div style="background:#F4F6F9;padding:8px 14px;text-align:center;font-size:12px;color:#7F8C8D;font-weight:600">📦 Ticket archivé</div>`:'';
  const statBtns=isAdmin?`<div class="status-bar">${STATS.map(s=>`<button class="s-btn" style="background:${t.statut===s.id?s.c:'#F4F6F9'};color:${t.statut===s.id?'#fff':'#7F8C8D'}" onclick="changeStatut('${s.id}')">${s.l}</button>`).join('')}${archiveBtn}${unarchiveBtn}</div>`:'';
  return `
  <div class="wrap ticket-view">
    <div class="hdr">
      <button style="background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:16px;flex-shrink:0" onclick="openTicket=null;render()">←</button>
      <div style="flex:1;overflow:hidden">
        <div style="font-size:14px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(t.titre)}</div>
        <div style="font-size:10px;opacity:.6">${cat.l} · <span style="color:${stat.c}">${stat.l}</span></div>
      </div>
      ${isAdmin?`<button class="adm-btn" style="background:#27AE60;color:#fff">Axel ✓</button>`:''}
    </div>
    ${archivedBanner}
    ${statBtns}
    <div class="ticket-info" style="border-left-color:${cat.c}">
      <h2>${esc(t.titre)}</h2>
      ${t.description?`<p>${esc(t.description)}</p>`:''}
      <div style="margin-top:6px;font-size:11px;color:#B0B8C1">${esc(t.auteur)} · ${new Date(t.created_at).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'})}</div>
    </div>
    <div class="messages-list" id="msgList">${msgs||'<div class="spin">Démarrez la conversation...</div>'}</div>
    <div class="msg-input-wrap">
      <button class="attach-btn" id="attachBtn">📎<input type="file" accept="image/*,application/pdf,.pdf" id="fileInp" onchange="handleFile(this)"></button>
      <textarea class="msg-input" id="msgInput" rows="1" placeholder="Votre message..." oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
      <button class="send-btn" onclick="sendMessage()">↑</button>
    </div>
  </div>`;
}

// ── MODALS ──────────────────────────────────────────────────────────────────
function renderAddSheet(){
  const cats=CATS.map(c=>`<button class="cat" style="border-color:${c.c};background:${selectedCat===c.id?c.c:'transparent'};color:${selectedCat===c.id?'#fff':c.c}" onclick="selectedCat='${c.id}';render()">${c.l}</button>`).join('');
  return `<div class="ovl" id="addSheet" style="display:none" onclick="if(event.target===this)document.getElementById('addSheet').style.display='none'">
    <div class="sheet">
      <h2>Nouveau ticket</h2>
      <div class="fg"><label>Catégorie</label><div class="cats">${cats}</div></div>
      <div class="fg"><label>Titre *</label><input id="fTitre" placeholder="Décrivez le problème en une phrase..."></div>
      <div class="fg"><label>Description</label><textarea id="fDesc" rows="3" placeholder="Étapes pour reproduire, contexte..."></textarea></div>
      <div class="fg"><label>Votre nom</label><input id="fAuteur" placeholder="Geoffrey, Hugo..." value="${esc(currentUser)}"></div>
      <button class="btn-s" id="submitBtn" onclick="submitTicket()">Créer le ticket</button>
    </div>
  </div>`;
}

function renderPinSheet(){
  return `<div class="ovl" id="pinSheet" style="display:none" onclick="if(event.target===this){document.getElementById('pinSheet').style.display='none';pinVal=''}">
    <div class="sheet" style="text-align:center">
      <h2>Espace Axel</h2>
      <p style="color:#7F8C8D;font-size:13px;margin-bottom:18px">Code d'accès consultant</p>
      <div style="display:flex;gap:10px;justify-content:center;margin-bottom:16px" id="pinDots">
        ${[0,1,2,3].map(i=>`<div style="width:46px;height:52px;border:2px solid ${pinVal.length>i?'#1A1A2E':'#E0E4E8'};border-radius:10px;font-size:20px;display:flex;align-items:center;justify-content:center;background:${pinVal.length>i?'#1A1A2E':'#F4F6F9'};color:${pinVal.length>i?'#fff':'transparent'}">●</div>`).join('')}
      </div>
      <p id="pinErr" style="color:#E94560;font-size:12px;margin-bottom:10px;display:none">Code incorrect</p>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;max-width:220px;margin:0 auto">
        ${['1','2','3','4','5','6','7','8','9','','0','⌫'].map((k,i)=>k===''?'<div></div>':`<button onclick="pinKey('${k}')" style="padding:13px;background:${k==='⌫'?'#FFF0F0':'#F4F6F9'};border:none;border-radius:10px;font-size:20px;font-weight:700;cursor:pointer;color:${k==='⌫'?'#E94560':'#1A1A2E'}">${k}</button>`).join('')}
      </div>
    </div>
  </div>`;
}

// ── EVENTS ──────────────────────────────────────────────────────────────────
function bindEvents(){
  const ab=document.getElementById('adminBtn');
  if(ab) ab.onclick=()=>{ if(isAdmin){isAdmin=false;render();}else document.getElementById('pinSheet').style.display='flex';};
  const fb=document.getElementById('fabBtn');
  if(fb) fb.onclick=()=>document.getElementById('addSheet').style.display='flex';
  // Scroll messages en bas
  const ml=document.getElementById('msgList');
  if(ml) setTimeout(()=>ml.scrollTop=ml.scrollHeight,50);
  // Focus search
  const si=document.getElementById('searchInp');
  if(si){const v=si.value;si.setSelectionRange(v.length,v.length);}
}

function pinKey(k){
  if(k==='⌫'){pinVal=pinVal.slice(0,-1);}else{pinVal+=k;}
  document.getElementById('pinErr').style.display='none';
  // Refresh dots
  document.getElementById('pinDots').innerHTML=[0,1,2,3].map(i=>`<div style="width:46px;height:52px;border:2px solid ${pinVal.length>i?'#1A1A2E':'#E0E4E8'};border-radius:10px;font-size:20px;display:flex;align-items:center;justify-content:center;background:${pinVal.length>i?'#1A1A2E':'#F4F6F9'};color:${pinVal.length>i?'#fff':'transparent'}">●</div>`).join('');
  if(pinVal.length===4){
    if(pinVal===ADMIN_PIN){isAdmin=true;document.getElementById('pinSheet').style.display='none';pinVal='';render();}
    else{document.getElementById('pinErr').style.display='block';setTimeout(()=>{pinVal='';document.getElementById('pinDots').innerHTML=[0,1,2,3].map(i=>`<div style="width:46px;height:52px;border:2px solid #E0E4E8;border-radius:10px;display:flex;align-items:center;justify-content:center;background:#F4F6F9;color:transparent">●</div>`).join('');},700);}
  }
}

// ── ACTIONS ─────────────────────────────────────────────────────────────────
async function submitTicket(){
  const titre=document.getElementById('fTitre')?.value.trim();
  if(!titre)return;
  document.getElementById('submitBtn').disabled=true;
  currentUser=document.getElementById('fAuteur')?.value.trim()||'Geoffrey';
  await sb.from('feedback').insert({titre,description:document.getElementById('fDesc')?.value.trim(),categorie:selectedCat,auteur:currentUser,statut:'recu'});
  document.getElementById('addSheet').style.display='none';
  await loadTickets();
  render();
}

async function openTicketFn(id){
  openTicket=tickets.find(t=>t.id===id);
  if(!openTicket)return;
  await loadMessages(id);
  render();
}

async function loadMessages(fid){
  const{data}=await sb.from('messages').select('*').eq('feedback_id',fid).order('created_at');
  messages=data||[];
}

async function sendMessage(){
  const inp=document.getElementById('msgInput');
  const txt=inp?.value.trim();
  if(!txt||!openTicket)return;
  const auteur=isAdmin?'Axel':(currentUser||'Geoffrey');
  inp.value='';inp.style.height='auto';
  await sb.from('messages').insert({feedback_id:openTicket.id,contenu:txt,auteur,type:'text',url:''});
  // Si Axel répond, met à jour statut
  if(isAdmin&&openTicket.statut==='recu'){await sb.from('feedback').update({statut:'cours'}).eq('id',openTicket.id);openTicket.statut='cours';}
  await loadMessages(openTicket.id);
  await loadTickets();
  openTicket=tickets.find(t=>t.id===openTicket.id)||openTicket;
  render();
}

async function handleFile(input){
  if(!input.files||!input.files[0]||!openTicket)return;
  const file=input.files[0];
  const isImg=file.type.startsWith('image/');
  const path=openTicket.id+'_'+Date.now()+'_'+file.name.replace(/[^a-z0-9.]/gi,'_');
  const{data:up,error}=await sb.storage.from('screenshots').upload(path,file);
  if(error||!up){alert('Erreur upload');return;}
  const{data:urlD}=sb.storage.from('screenshots').getPublicUrl(up.path);
  const auteur=isAdmin?'Axel':(currentUser||'Geoffrey');
  await sb.from('messages').insert({feedback_id:openTicket.id,contenu:isImg?'📸 Capture d\'écran':'📎 Document joint',auteur,type:isImg?'image':'file',url:urlD.publicUrl});
  await loadMessages(openTicket.id);
  render();
}

async function archiveTicket(id){
  await sb.from('feedback').update({archived:true}).eq('id',id);
  openTicket=null;
  await loadTickets();
  render();
}

async function unarchiveTicket(id){
  await sb.from('feedback').update({archived:false}).eq('id',id);
  await loadTickets();
  openTicket=tickets.find(t=>t.id===id)||null;
  render();
}

async function changeStatut(newStatut){
  if(!openTicket)return;
  await sb.from('feedback').update({statut:newStatut}).eq('id',openTicket.id);
  openTicket.statut=newStatut;
  await loadTickets();
  render();
}

// ── CHARGEMENT ───────────────────────────────────────────────────────────────
async function loadTickets(){
  const{data:tks}=await sb.from('feedback').select('*').order('created_at',{ascending:false});
  if(!tks){tickets=[];return;}
  // Charger les derniers messages pour chaque ticket
  const ids=tks.map(t=>t.id);
  const{data:msgs}=await sb.from('messages').select('feedback_id,contenu,created_at').in('feedback_id',ids).order('created_at',{ascending:false});
  const lastMsgMap={},countMap={};
  (msgs||[]).forEach(m=>{if(!lastMsgMap[m.feedback_id]){lastMsgMap[m.feedback_id]=m.contenu;}countMap[m.feedback_id]=(countMap[m.feedback_id]||0)+1;});
  tickets=tks.map(t=>({...t,_lastMsg:lastMsgMap[t.id]||'',_msgCount:countMap[t.id]||0}));
}

// Init
loadTickets().then(()=>render());
</script>
